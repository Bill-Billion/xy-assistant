version: '3.8'

services:
  xy-assistant:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: xy-assistant:latest
    container_name: xy-assistant-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - DOUBAO_API_URL=${DOUBAO_API_URL}
      - DOUBAO_MODEL=${DOUBAO_MODEL}
      - DOUBAO_TIMEOUT=${DOUBAO_TIMEOUT:-10.0}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.7}
      - ENVIRONMENT=prod
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs
    networks:
      - xy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  # 可选：Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: xy-assistant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - xy-assistant
    networks:
      - xy-network
    profiles:
      - "with-nginx"

networks:
  xy-network:
    driver: bridge

volumes:
  logs:
    driver: local