MALL_DIGITAL_HEALTH_ROBOT:
  limit: 40
  base:
    fields:
      confidence: 0.88
  templates:
    - id: mall_robot_buy
      text: "我要购买数字健康机器人。"
    - id: mall_robot_package
      text: "数字健康机器人有哪些套餐？"
    - id: mall_robot_consult
      text: "推荐一下数字健康机器人，看看适合不适合我家。"

CHAT:
  limit: 50
  base:
    fields:
      confidence: 0.85
  templates:
    - id: chat_lonely
      text: "最近有点孤独，陪我聊聊。"
    - id: chat_greet
      text: "{greet}，我们聊会天吧。"
      vary:
        greet: ["小雅", "小雅你好", "亲爱的", "朋友"]
    - id: chat_feelings
      text: "心情不太好，想找人说说话。"

UNKNOWN:
  limit: 40
  base:
    fields:
      confidence: 0.4
      clarify_required: true
      clarify_message: "我暂时还没有相关功能，不过可以为您提供健康或生活类帮助。"
  templates:
    - id: unknown_poem
      text: "你能帮我写一首诗吗？"
    - id: unknown_stock
      text: "最近股市应该怎么投资比较好？"
